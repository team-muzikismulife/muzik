name: PR 템플릿 검사

permissions:
  pull-requests: read

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-template:
    runs-on: ubuntu-latest
    steps:
      - name: 체크리스트 달성도 검사
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # 체크리스트 자체가 누락된 PR은 템플릿을 사용하지 않은 것으로 본다
          if ! echo "$PR_BODY" | grep -Eq "\- \[[xX ]\]"; then
            echo "❌ PR 템플릿의 체크리스트가 누락되었습니다. 템플릿에 맞게 작성해주세요."
            exit 1
          fi

          # 체크 안 된 항목('- [ ]')이 하나라도 남아있으면 에러 뱉기
          if echo "$PR_BODY" | grep -q "\- \[ \]"; then
            echo "❌ 체크리스트 중 완료되지 않은 항목이 있습니다! 모두 [x]로 체크해야 Merge할 수 있습니다."
            exit 1
          fi

          checked_count=$(echo "$PR_BODY" | grep -Ec "^\- \[[xX]\]")
          if [ "$checked_count" -lt 4 ]; then
            echo "❌ PR 체크리스트 4개 항목이 모두 체크되어야 합니다."
            exit 1
          fi

          required_items=(
            "브랜치 컨벤션(feature/00-name)을 지켰나요?"
            "커밋 컨벤션(feat:, fix: 등)을 지켰나요?"
            "작업 전에 관련 이슈를 생성하고 연결했나요?"
            "내 코드가 팀의 기존 코드를 망가뜨리지 않았는지 확인했나요?"
          )

          # 각 필수 항목이 '체크된 상태([x])'로 존재하는지 검증 (텍스트만 있고 미체크면 실패)
          for item in "${required_items[@]}"; do
            if ! echo "$PR_BODY" | grep -Fq "[x] $item" && ! echo "$PR_BODY" | grep -Fq "[X] $item"; then
              echo "❌ PR 체크리스트 필수 항목이 누락되었거나 체크되지 않았습니다: $item"
              exit 1
            fi
          done

          # 본문이 너무 짧은지 검사 (최소한의 설명 요구)
          if [ ${#PR_BODY} -lt 30 ]; then
             echo "❌ PR 설명이 너무 짧습니다. 템플릿에 맞게 어떤 작업을 했는지 명확하게 설명해주세요."
             exit 1
          fi

          # 연결된 이슈 참조가 있는지 검사 (#숫자 형태)
          # 기능 PR은 'Close #N', 릴리스 승격 PR은 '관련 이슈 #N' 모두 허용
          if ! echo "$PR_BODY" | grep -qE "#[0-9]+"; then
             echo "❌ 연결된 이슈 참조(#이슈번호)가 없습니다. 'Close #12' 처럼 관련 이슈를 연결해주세요."
             exit 1
          fi

          echo "✅ PR 템플릿 검사 통과 성공!"

name: iOS CI Pipeline

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  # PR 번호(또는 브랜치 ref) 기준 — 같은 PR에 새 커밋이 오면 이전 실행을 취소
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1) SwiftLint — 지금 바로 동작 (프로젝트 없어도 통과)
  # ──────────────────────────────────────────────
  lint:
    name: SwiftLint 검사
    runs-on: macos-14
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 고정 SHA (공급망 보안)

      - name: SwiftLint 설치
        run: brew install swiftlint

      - name: 린트 실행
        run: |
          # Swift 파일이 아직 없으면(프로젝트 생성 전) 통과 처리
          if [ -z "$(find . -name '*.swift' -not -path './.build/*' -print -quit)" ]; then
            echo "✅ 린트할 Swift 파일이 아직 없습니다 — 통과."
            exit 0
          fi
          swiftlint lint --strict --reporter github-actions-logging

  # ──────────────────────────────────────────────
  # 2) Xcode 빌드 & 테스트
  #    ⚠️ Xcode 프로젝트 생성 후 아래 env 값을 채우고
  #       `if: false`를 지워 활성화하세요.
  # ──────────────────────────────────────────────
  build-test:
    name: Xcode 빌드 & 테스트
    runs-on: macos-14
    if: false # TODO: Xcode 프로젝트 생성 후 이 줄을 삭제해 활성화
    env:
      SCHEME: "Muzik"          # TODO: 실제 스킴 이름으로 교체
      PROJECT: "Muzik.xcodeproj" # 또는 WORKSPACE: "Muzik.xcworkspace"
      DESTINATION: "platform=iOS Simulator,name=iPhone 15,OS=latest"
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 고정 SHA (공급망 보안)

      - name: Xcode 버전 선택
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: 빌드 & 테스트
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

name: CI Pipeline

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  # PR 번호(또는 브랜치 ref) 기준 — 같은 PR에 새 커밋이 오면 이전 실행을 취소
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1) TypeScript 타입 검사 — React Native 앱 코드
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript 검사
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 고정 SHA (공급망 보안)
        with:
          persist-credentials: false # push 불필요 job — 토큰을 러너 git config에 남기지 않는다

      - name: Node 설정
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 타입 검사
        run: npm run lint

  # ──────────────────────────────────────────────
  # 2) SwiftLint — Swift 파일이 남아 있을 때만 동작
  #    (RN 전환 이후로는 사실상 통과 처리)
  # ──────────────────────────────────────────────
  swiftlint:
    name: SwiftLint 검사
    runs-on: macos-14
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 고정 SHA (공급망 보안)
        with:
          persist-credentials: false # push 불필요 job — 토큰을 러너 git config에 남기지 않는다

      - name: 린트 실행
        run: |
          # Swift 파일이 없으면 통과 (RN 전환 후 기본 경로)
          if [ -z "$(find . -name '*.swift' -not -path './.build/*' -print -quit)" ]; then
            echo "✅ 린트할 Swift 파일이 없습니다 — 통과."
            exit 0
          fi
          brew install swiftlint
          swiftlint lint --strict --reporter github-actions-logging
